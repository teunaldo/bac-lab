###############################################################################
# GitHub Actions Workflow – bac-lab
###############################################################################

name: Deploy Branch as Code

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: false

env:
  org_admin:       "admin"
  org_admin_email: "admin-branch@netascode.cisco.com"
  v3_auth_pass:                       "Cisco12345"
  v3_priv_pass:                       "Cisco12345"
  local_status_page_username:         "admin"
  local_page_username:                "admin"
  local_status_page_password:         "Cisco!12345C60972A"
  local_page_password:                "Cisco!12345C60972A"
  radius_accounting_server1_secret:   "Cisco12345!"
  radius_server1_secret:              "Cisco12345!"
  snmp_username:                      "admin"
  snmp_passphrase:                    "Cisco12345"
  # ── Terraform ──────────────────────────────────────────────────────────
  TF_VAR_meraki_api_key: ${{ secrets.MERAKI_API_KEY }}
  TF_IN_AUTOMATION: "true"
  # ── Secrets referenced by !env tags in data/pods_variables.nac.yaml ───
  # Configure these in GitHub → Settings → Secrets and variables → Actions:
  #
  # MERAKI_API_KEY            – Meraki Dashboard API key
  # ORG_NAME                  – Organization name (e.g. "CX Meraki Lab")
  # VPN_HUB_NETWORK_NAME      – VPN hub network name (e.g. "Datacenter")
  #
  # ── Device serials (per-branch) ───────────────────────────────────────
  # BRANCH1_MX_SERIAL         – Branch 1 MX appliance serial
  # BRANCH1_MS_SERIAL         – Branch 1 MS switch serial
  # BRANCH1_CW_SERIAL         – Branch 1 CW access point serial
  # BRANCH2_MX_SERIAL         – Branch 2 MX appliance serial
  # BRANCH2_MS_SERIAL         – Branch 2 MS switch serial
  # BRANCH2_CW_SERIAL         – Branch 2 CW access point serial

  # Pass !env-referenced vars so the NAC YAML engine can resolve them
  # org_name:              ${{ secrets.ORG_NAME }}
  # vpn_hub_network_name:  ${{ secrets.VPN_HUB_NETWORK_NAME }}
  # branch1_mx_serial:     ${{ secrets.BRANCH1_MX_SERIAL }}
  # branch1_ms_serial:     ${{ secrets.BRANCH1_MS_SERIAL }}
  # branch1_cw_serial:     ${{ secrets.BRANCH1_CW_SERIAL }}
  # branch2_mx_serial:     ${{ secrets.BRANCH2_MX_SERIAL }}
  # branch2_ms_serial:     ${{ secrets.BRANCH2_MS_SERIAL }}
  # branch2_cw_serial:     ${{ secrets.BRANCH2_CW_SERIAL }}
  org_name:              Org-3665367146726165084
  vpn_hub_network_name:  Datacenter
  branch1_mx_serial:     XXXX-XXXX-XXXX
  branch1_ms_serial:     XXXX-XXXX-XXXX
  branch1_cw_serial:     XXXX-XXXX-XXXX
  branch2_mx_serial:     XXXX-XXXX-XXXX
  branch2_ms_serial:     XXXX-XXXX-XXXX
  branch2_cw_serial:     XXXX-XXXX-XXXX
  MERAKI_API_KEY:                    ${{ secrets.MERAKI_API_KEY }}


jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Job 1 – Prepare: merge data YAML files via the workspaces/ sub-project
  # ───────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare – Merge Model
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Merge YAML data model
        working-directory: workspaces
        run: |
          echo "📦 Starting merge model process in ./workspaces..."
          find . ! -name 'main.tf' ! -name '.' -print

          echo "🚀 Running terraform init..."
          terraform init

          echo "⚙️ Running terraform apply..."
          terraform apply -auto-approve

          echo "📄 Checking for merged_configuration.nac.yaml..."
          if [ ! -f merged_configuration.nac.yaml ]; then
            echo "❌ merged_configuration.nac.yaml not found!"
            exit 1
          else
            echo "✅ merged_configuration.nac.yaml created successfully."
          fi

          sleep 5
          ls -lh merged_configuration.nac.yaml
          chmod 644 merged_configuration.nac.yaml

      - name: Upload merged configuration
        uses: actions/upload-artifact@v5
        with:
          name: merged-config
          path: workspaces/merged_configuration.nac.yaml
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # Job 2 – Validate: terraform fmt + nac-validate
  # ───────────────────────────────────────────────────────────────────────
  validate:
    name: Syntax and Semantics Validation
    needs: [prepare]
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Mark workspace as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Download merged configuration
        uses: actions/download-artifact@v5
        with:
          name: merged-config
          path: workspaces

      - name: Terraform format check
        run: |
          echo "🔍 Checking Terraform formatting..."
          terraform fmt -check | tee fmt_output.txt
          if grep -qE '\.tf' fmt_output.txt; then
            echo "❌ One or more Terraform files are not formatted correctly. Run 'terraform fmt' to fix them."
            exit 1
          else
            echo "✅ All Terraform files are properly formatted."
          fi

      - name: NAC validate
        run: |
          echo "🔍 Running nac-validate..."
          nac-validate ./workspaces/merged_configuration.nac.yaml | tee validate_output.txt
          if grep -q "ERROR" validate_output.txt; then
            echo "❌ nac-validate failed with errors."
            exit 1
          else
            echo "✅ nac-validate passed."
          fi

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: validate-outputs
          path: |
            fmt_output.txt
            validate_output.txt
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # Job 3 – Plan: generate and archive the Terraform plan
  # ───────────────────────────────────────────────────────────────────────
  plan:
    name: Plan
    needs: [validate]
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Mark repository as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$(pwd)"

      - name: Download merged configuration
        uses: actions/download-artifact@v5
        with:
          name: merged-config
          path: workspaces

      - name: Restore Terraform state cache
        uses: actions/cache/restore@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
          key: terraform-state-${{ github.ref_name }}
          restore-keys: |
            terraform-state-

      - name: Terraform plan
        run: |
          ls -la terraform.tfstate 2>/dev/null && echo "✅ Existing state found" || echo "⚠️ No existing state – fresh deployment"
          terraform init -input=false
          terraform plan -out=plan.tfplan -input=false
          terraform show -no-color plan.tfplan > plan.txt
          terraform show -json plan.tfplan | jq > plan.json
          echo "✅ Plan completed and stored."

      - name: Upload plan artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: plan-outputs
          path: |
            plan.tfplan
            plan.txt
            plan.json
          retention-days: 7

      - name: Upload state for next jobs
        uses: actions/upload-artifact@v5
        with:
          name: terraform-state-pre-deploy
          path: |
            terraform.tfstate
            terraform.tfstate.backup
          retention-days: 7
          if-no-files-found: ignore

  # ───────────────────────────────────────────────────────────────────────
  # Job 4 – Deploy: apply the saved plan (requires manual approval)
  # ───────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: [plan]
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    timeout-minutes: 60
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download merged configuration
        uses: actions/download-artifact@v5
        with:
          name: merged-config
          path: workspaces

      - name: Download plan
        uses: actions/download-artifact@v5
        with:
          name: plan-outputs
          path: .

      - name: Restore Terraform state
        uses: actions/download-artifact@v5
        continue-on-error: true
        with:
          name: terraform-state-pre-deploy
          path: .

      - name: Terraform apply
        id: apply
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve plan.tfplan

      - name: Save Terraform state to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            terraform.tfstate
            terraform.tfstate.backup
          key: terraform-state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload Terraform state artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: terraform-state
          path: |
            terraform.tfstate
            terraform.tfstate.backup
          retention-days: 90
          overwrite: true

      - name: Terraform destroy (rollback on failure)
        if: failure() && steps.apply.outcome == 'failure'
        run: |
          echo "❌ Deploy failed – destroying all Terraform-managed resources to revert changes..."
          terraform destroy -auto-approve -input=false

  # ───────────────────────────────────────────────────────────────────────
  # Job 5a – Idempotency check (runs first after deploy)
  # ───────────────────────────────────────────────────────────────────────
  idempotency-test:
    name: Idempotency Test
    needs: [deploy]
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download merged configuration
        uses: actions/download-artifact@v5
        with:
          name: merged-config
          path: workspaces

      - name: Download Terraform state
        uses: actions/download-artifact@v5
        with:
          name: terraform-state
          path: .

      - name: Run idempotency check
        run: |
          terraform init -input=false
          exit_code=0
          terraform plan -input=false -out=idempotency.tfplan -detailed-exitcode || exit_code=$?
          terraform show -no-color idempotency.tfplan > idempotency_plan.txt

          if [ "$exit_code" -eq 2 ]; then
            echo "❌ Terraform plan detected changes! Idempotency test failed."
            echo "🗜️ Showing plan output:"
            cat idempotency_plan.txt
            exit 1
          elif [ "$exit_code" -eq 0 ]; then
            echo "✅ Terraform is idempotent. No changes detected."
          else
            echo "⚠️ Terraform plan failed with an unexpected exit code: $exit_code"
            exit $exit_code
          fi

      - name: Upload idempotency artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: idempotency-results
          path: |
            idempotency_plan.txt
            idempotency.tfplan
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────
  # Job 5b – Integration tests (runs after idempotency check)
  # ───────────────────────────────────────────────────────────────────────
  integration-test:
    name: Integration Test
    needs: [idempotency-test]
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Mark repository as safe for git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$(pwd)"

      - name: Download merged configuration
        uses: actions/download-artifact@v5
        with:
          name: merged-config
          path: workspaces

      - name: Run integration tests
        run: |
          echo "Delaying integration tests for 60 seconds..."
          sleep 60
          set -o pipefail
          nac-test -d workspaces/merged_configuration.nac.yaml -t ./tests/templates -o ./tests/results 2>&1 | tee test_output.txt

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: integration-test-results
          path: |
            tests/results/*.html
            tests/results/xunit.xml
            test_output.txt
            resolved.yaml
          retention-days: 7

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Integration Test Results
          path: tests/results/xunit.xml
          reporter: python-xunit

  # ───────────────────────────────────────────────────────────────────────
  # Post-pipeline: failure handling
  # Destroy only when the deploy job itself failed.
  # ───────────────────────────────────────────────────────────────────────
  failure-cleanup:
    name: Failure Cleanup
    needs: [prepare, validate, plan, deploy, integration-test, idempotency-test]
    if: failure()
    runs-on: ubuntu-latest
    container:
      image: danischm/nac:0.1.6
      options: --user root
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download Terraform state
        if: needs.deploy.result == 'failure'
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: terraform-state
          path: .

      - name: Terraform destroy on deploy failure
        if: needs.deploy.result == 'failure'
        run: |
          terraform init -input=false
          terraform destroy -auto-approve || true
